name: Go Security CI
on:
  push:
    branches:
      - "master"
      - "feat/bff-api"
  pull_request:
    branches:
      - "*"
      - "feat/bff-api"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          check-latest: "true"
          go-version-file: "worker/go.mod"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability checks for K8s worker
        working-directory: ./worker
        run: |
          govulncheck ./... >/tmp/govuln.txt 2>&1 || VULN_EXIT=$?
          VULN_EXIT=${VULN_EXIT:-0}
          cat /tmp/govuln.txt

          if [ "$VULN_EXIT" -ne 3 ]; then
            exit "$VULN_EXIT"
          fi

          IGNORED=$(grep -oE 'GO-[0-9]+-[0-9]+' ../.govulnignore 2>/dev/null | sort -u | paste -sd'|')
          FOUND=$(grep -oE 'GO-[0-9]+-[0-9]+' /tmp/govuln.txt | sort -u)
          UNKNOWN="$FOUND"
          [ -n "$IGNORED" ] && UNKNOWN=$(echo "$UNKNOWN" | grep -vxE "$IGNORED" || true)

          if [ -n "$UNKNOWN" ]; then
            echo "Unsuppressed vulnerabilities found: $UNKNOWN"
            exit 1
          fi

          echo -e "\033[0;32m✅ govulncheck: all findings suppressed via .govulnignore\033[0m"
  gosec:
    name: GoSec Security Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          check-latest: "true"
          go-version-file: "worker/go.mod"
      - name: install gosec
        run: curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
      - name: Run Gosec Security Scanner for K8s worker
        working-directory: ./worker
        run: $(go env GOPATH)/bin/gosec -exclude=G115 -severity=high -confidence=medium ./...

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          exit-code: "1"
          scan-type: "fs"
          scan-ref: "./"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
