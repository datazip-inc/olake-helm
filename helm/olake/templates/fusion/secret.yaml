{{- if .Values.fusion.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "olake.fullname" . }}-fusion
  namespace: {{ include "olake.namespace" . }}
  labels:
    {{- include "olake.labels" . | nindent 4 }}
    app.kubernetes.io/component: fusion
type: Opaque
data:
  AdminUsername: {{ (.Values.fusion.adminUser | default "admin") | b64enc | quote }}
  AdminPassword: {{ (.Values.fusion.adminPassword | default "password") | b64enc | quote }}
  {{- if .Values.postgresql.enabled }}
  DatabaseUsername: {{ (.Values.fusion.database.username | default .Values.postgresql.auth.postgresUser) | b64enc | quote }}
  DatabasePassword: {{ (.Values.fusion.database.password | default .Values.postgresql.auth.postgresPassword) | b64enc | quote }}
  {{- else }}
  DatabaseUsername: {{ .Values.fusion.database.username | b64enc | quote }}
  DatabasePassword: {{ .Values.fusion.database.password | b64enc | quote }}
  {{- end }}
{{- end }}
