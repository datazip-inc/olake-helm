{{- if .Values.fusion.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "olake.fullname" . }}-fusion-config
  namespace: {{ include "olake.namespace" . }}
  labels:
    {{- include "olake.labels" . | nindent 4 }}
    app.kubernetes.io/component: fusion
data:
  config.yaml: |
    ams:
      server-expose-host: "127.0.0.1"

      thrift-server:
        table-service:
          bind-port: {{ .Values.fusion.server.table.port }}
        optimizing-service:
          bind-port: {{ .Values.fusion.server.optimizing.port }}

      http-server:
        bind-port: {{ .Values.fusion.server.rest.port }}

      optimizer:
        task-execute-timeout: 1h
        max-planning-parallelism: {{ .Values.fusion.optimizer.spark.desiredParallelism }}

      {{- if or .Values.fusion.shade.identifier .Values.fusion.shade.sensitiveKeywords }}
      shade:
        {{- if .Values.fusion.shade.identifier }}
        identifier: {{ .Values.fusion.shade.identifier }}
        {{- end }}
        {{- if .Values.fusion.shade.sensitiveKeywords }}
        sensitive-keywords: {{ .Values.fusion.shade.sensitiveKeywords }}
        {{- end }}
      {{- end }}

      database:
        type: postgres
        jdbc-driver-class: org.postgresql.Driver
        url: >-
          {{- if .Values.postgresql.enabled }}
            {{ printf "jdbc:postgresql://postgresql:5432/fusion" }}
          {{- else }}
            {{- $externalPg := .Values.postgresql.external.properties }}
            {{ printf "jdbc:postgresql://%s:%s/%s" $externalPg.host $externalPg.port $externalPg.fusion_database }}
          {{- end }}

      terminal:
        local:
          using-session-catalog-for-hive: false
          spark.sql.iceberg.handle-timestamp-without-timezone: false
          spark.sql.codegen.wholeStage: false

    containers:
      - name: sparkContainer
        container-impl: org.apache.amoro.server.manager.SparkOptimizerContainer
        properties:
          job-uri: {{ .Values.fusion.optimizer.spark.jobUri | quote }}
          ams-optimizing-uri: thrift://{{ include "olake.fullname" . }}-fusion-optimizing.{{ include "olake.namespace" . }}.svc.cluster.local:{{ .Values.fusion.server.optimizing.port }}
          spark-conf.spark.kubernetes.container.image: "{{ include "olake.registryBase" . }}/{{ .Values.fusion.optimizer.spark.image.repository }}:{{ .Values.fusion.optimizer.spark.image.tag }}"
          spark-conf.spark.kubernetes.container.image.pullPolicy: "{{ .Values.fusion.optimizer.spark.image.pullPolicy }}"
          spark-conf.spark.kubernetes.namespace: {{ include "olake.namespace" . | quote }}
          spark-conf.spark.kubernetes.authenticate.driver.serviceAccountName: "{{ include "olake.fusionServiceAccountName" . }}"
          spark-conf.spark.kubernetes.authenticate.executor.serviceAccountName: "{{ include "olake.fusionServiceAccountName" . }}"
          spark-conf.spark.kubernetes.driver.label.olake.io/workload: "fusion-master"
          spark-conf.spark.kubernetes.executor.label.olake.io/workload: "fusion-executor"
          spark-conf.spark.kubernetes.driver.podTemplateFile: "/usr/local/amoro/conf/pod-template.yaml"
          spark-conf.spark.kubernetes.executor.podTemplateFile: "/usr/local/amoro/conf/pod-template.yaml"
          {{- range $key, $value := .Values.fusion.optimizer.spark.extraConfig }}
          {{ printf "spark-conf.%s" $key }}: "{{ $value }}"
          {{- end }}
          {{- range $key, $value := .Values.fusion.optimizer.spark.properties }}
          {{ $key }}: "{{ $value }}"
          {{- end }}

  pod-template.yaml: |
    apiVersion: v1
    kind: Pod
    {{- if not (and (empty .Values.fusion.nodeSelector) (empty .Values.fusion.tolerations) (empty .Values.fusion.affinity)) }}
    spec:
      {{- with .Values.fusion.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- else }}
    spec: {}
      {{- end }}

{{- end }}
