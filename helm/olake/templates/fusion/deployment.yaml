{{- if .Values.fusion.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "olake.fullname" . }}-fusion
  namespace: {{ include "olake.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "olake.name" . }}-fusion
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: fusion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "olake.name" . }}-fusion
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: fusion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "olake.name" . }}-fusion
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: fusion
    spec:
      {{- with .Values.fusion.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "olake.fusionServiceAccountName" . }}
      initContainers:
      - name: create-fusion-database
        image: "postgres:14-alpine"
        imagePullPolicy: IfNotPresent
        command: ["bash", "-c"]
        args:
          - |
            set -e
            echo "Waiting for PostgreSQL service to be resolvable..."
            until nslookup "${POSTGRES_HOST}" > /dev/null 2>&1; do
              echo "PostgreSQL service not yet resolvable. Waiting..."
              sleep 2
            done
            echo "PostgreSQL service is resolvable!"

            # Wait for PostgreSQL to be ready (port check)
            echo "Waiting for PostgreSQL to be ready (port check)..."
            until nc -z "${POSTGRES_HOST}" "${POSTGRES_PORT}"; do
              echo "PostgreSQL port not ready yet. Waiting..."
              sleep 2
            done
            echo "PostgreSQL port is ready!"

            export PGPASSWORD=${POSTGRES_PASSWORD}
            
            echo "Attempting to create database 'fusion'..."
            if ! psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -lqt | cut -d \| -f 1 | grep -qw fusion; then
              psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -d postgres -c "CREATE DATABASE fusion"
              echo "Database 'fusion' created."
            else
              echo "Database 'fusion' already exists. Skipping creation."
            fi
        env:
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: host
          - name: POSTGRES_PORT
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: port
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: password
      - name: install-spark
        image: olakego/fusion-spark:latest
        command: ["sh", "-c", "cp -r /opt/spark/* /target/"]
        volumeMounts:
          - name: spark-binaries
            mountPath: /target
      containers:
        - name: fusion
          image: "{{ .Values.fusion.image.repository }}:{{ .Values.fusion.image.tag }}"
          imagePullPolicy: {{ .Values.fusion.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              DB_HOST="${POSTGRESQL_SERVICE_HOST:-$POSTGRES_SEEDS}"
              DB_PORT="${POSTGRESQL_SERVICE_PORT:-$DB_PORT}"
              DB_URL="jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DBNAME}"
              echo "Using PostgreSQL URL: $DB_URL"
              export AMS_DATABASE_URL="$DB_URL"
              exec /entrypoint.sh ams
          ports:
            - name: rest
              containerPort: {{ .Values.fusion.server.rest.port }}
            - name: table
              containerPort: {{ .Values.fusion.server.table.port }}
            - name: optimizing
              containerPort: {{ .Values.fusion.server.optimizing.port }}
          volumeMounts:
            - name: fusion-config
              mountPath: /usr/local/amoro/conf/config.yaml
              subPath: config.yaml
            - name: spark-binaries
              mountPath: /opt/spark
          env:
            - name: AMS_CONFIG_PATH
              value: "/usr/local/amoro/conf/config.yaml"
            - name: AMS_SERVER__EXPOSE__HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DB
              value: "postgres12"
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}port{{ else }}{{ .Values.postgresql.external.secretKeys.port }}{{ end }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}username{{ else }}{{ .Values.postgresql.external.secretKeys.username }}{{ end }}
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}password{{ else }}{{ .Values.postgresql.external.secretKeys.password }}{{ end }}
            - name: POSTGRES_SEEDS
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}host{{ else }}{{ .Values.postgresql.external.secretKeys.host }}{{ end }}
            - name: DBNAME
              {{- if .Values.postgresql.enabled }}
              value: "fusion"
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ .Values.postgresql.external.secretKeys.fusion_database }}
              {{- end }}
            {{- range $key, $value := .Values.global.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.fusion.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: "AMS_ADMIN__USERNAME"
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.fullname" . }}-fusion
                  key: AdminUsername
            - name: "AMS_ADMIN__PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.fullname" . }}-fusion
                  key: AdminPassword
            - name: AMS_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}username{{ else }}{{ .Values.postgresql.external.secretKeys.username }}{{ end }}
            - name: AMS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}password{{ else }}{{ .Values.postgresql.external.secretKeys.password }}{{ end }}
          {{- with .Values.fusion.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: fusion-config
          configMap:
            name: {{ include "olake.fullname" . }}-fusion-config
        - name: spark-binaries
          emptyDir: {}
{{- end }}
