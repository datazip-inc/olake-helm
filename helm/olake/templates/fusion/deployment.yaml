{{- if .Values.fusion.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "olake.fullname" . }}-fusion
  namespace: {{ include "olake.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "olake.name" . }}-fusion
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: fusion
spec:
  replicas: 1
  # TODO: remove this when the dual registration issue is resolved.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "olake.name" . }}-fusion
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: fusion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "olake.name" . }}-fusion
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: fusion
      annotations:
        checksum/fusion-config: {{ include (print $.Template.BasePath "/fusion/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.fusion.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fusion.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "olake.fusionServiceAccountName" . }}
      initContainers:
      - name: create-fusion-database
        image: "{{ include "olake.registryBase" . }}/{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
        imagePullPolicy: IfNotPresent
        command: ["bash", "-c"]
        args:
          - |
            set -e
            echo "Waiting for PostgreSQL service to be resolvable..."
            until nslookup "${POSTGRES_HOST}" > /dev/null 2>&1; do
              echo "PostgreSQL service not yet resolvable. Waiting..."
              sleep 2
            done
            echo "PostgreSQL service is resolvable!"

            # Wait for PostgreSQL to be ready (port check)
            echo "Waiting for PostgreSQL to be ready (port check)..."
            until nc -z "${POSTGRES_HOST}" "${POSTGRES_PORT}"; do
              echo "PostgreSQL port not ready yet. Waiting..."
              sleep 2
            done
            echo "PostgreSQL port is ready!"

            export PGPASSWORD=${POSTGRES_PASSWORD}
            
            {{- if .Values.postgresql.enabled }}
            echo "Attempting to create database 'fusion'..."
            if ! psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -lqt | cut -d \| -f 1 | grep -qw "${POSTGRES_DATABASE}"; then
              psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -d postgres -c "CREATE DATABASE ${POSTGRES_DATABASE}"
              echo "Database '${POSTGRES_DATABASE}' created."
            else
              echo "Database '${POSTGRES_DATABASE}' already exists. Skipping creation."
            fi
            {{- else }}
            echo "External PostgreSQL is enabled, skipping database creation for 'fusion'."
            {{- end }}
        env:
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: {{ if .Values.postgresql.enabled }}host{{ else }}{{ .Values.postgresql.external.secretKeys.host }}{{ end }}
          - name: POSTGRES_PORT
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: {{ if .Values.postgresql.enabled }}port{{ else }}{{ .Values.postgresql.external.secretKeys.port }}{{ end }}
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: {{ if .Values.postgresql.enabled }}username{{ else }}{{ .Values.postgresql.external.secretKeys.username }}{{ end }}
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: {{ if .Values.postgresql.enabled }}password{{ else }}{{ .Values.postgresql.external.secretKeys.password }}{{ end }}
          - name: POSTGRES_DATABASE
            valueFrom:
              secretKeyRef:
                name: {{ include "olake.postgresql.secretName" . }}
                key: {{ if .Values.postgresql.enabled }}"fusion_database"{{ else }}{{ .Values.postgresql.external.secretKeys.fusion_database }}{{ end }}
      - name: install-spark
        image: {{ include "olake.registryBase" . }}/{{ .Values.fusion.optimizer.spark.image.repository }}:{{ .Values.fusion.optimizer.spark.image.tag }}
        command: ["sh", "-c", "cp -r /opt/spark/* /target/"]
        volumeMounts:
          - name: spark-binaries
            mountPath: /target
      containers:
        - name: fusion
          image: "{{ include "olake.registryBase" . }}/{{ .Values.fusion.image.repository }}:{{ .Values.fusion.image.tag }}"
          imagePullPolicy: {{ .Values.fusion.image.pullPolicy }}
          command: [ "/entrypoint.sh", "ams" ]
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    exec > /proc/1/fd/1 2>/proc/1/fd/2
                    set -e
                    BASE_URL="http://127.0.0.1:{{ .Values.fusion.server.rest.port }}"
                    echo "Running Fusion optimizer bootstrap via postStart at ${BASE_URL}..."

                    echo "Logging into Fusion..."
                    LOGIN_RC=0
                    for i in $(seq 1 60); do
                      set +e
                      LOGIN_RESP=$(curl -sS -f -c /tmp/cookies.txt \
                        -X POST "${BASE_URL}/api/ams/v1/login" \
                        -H "Content-Type: application/json" \
                        -H "X-Request-Source: Web" \
                        -d "{\"user\":\"${AMS_ADMIN__USERNAME}\",\"password\":\"${AMS_ADMIN__PASSWORD}\"}" 2>&1)
                      LOGIN_RC=$?
                      set -e
                      if [ "$LOGIN_RC" -eq 0 ]; then
                        echo "${LOGIN_RESP}"
                        break
                      fi
                      echo "Login attempt ${i}/60 failed (rc=${LOGIN_RC}): ${LOGIN_RESP}"
                      sleep 1
                    done
                    if [ "$LOGIN_RC" -ne 0 ]; then
                      echo "Login failed after retries (rc=${LOGIN_RC})."
                      exit "$LOGIN_RC"
                    fi

                    # ---- Optimizer Group ----
                    echo "Checking optimizer group 'spark-container'..."
                    GROUPS=$(curl -s -b /tmp/cookies.txt \
                      -H "X-Request-Source: Web" \
                      "${BASE_URL}/api/ams/v1/optimize/resourceGroups")

                    if echo "$GROUPS" | grep -q '"name":"spark-container"'; then
                      echo "Optimizer group 'spark-container' already exists."
                    else
                      echo "Creating optimizer group 'spark-container'..."
                      curl -s -b /tmp/cookies.txt \
                        -X POST "${BASE_URL}/api/ams/v1/optimize/resourceGroups" \
                        -H "Content-Type: application/json" \
                        -H "X-Request-Source: Web" \
                        -d '{"name":"spark-container","container":"sparkContainer","properties":{}}'
                      echo ""
                      sleep 5
                    fi

                    # ---- Optimizers ----
                    echo "Checking optimizers for group 'spark-container'..."
                    OPTIMIZERS=$(curl -s -b /tmp/cookies.txt \
                      -H "X-Request-Source: Web" \
                      "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers?page=1&pageSize=50")

                    JOB_IDS=$(echo "$OPTIMIZERS" | grep -oE '"jobId":"[^"]+"' | cut -d':' -f2 | tr -d '"')
                    if [ -n "$JOB_IDS" ]; then
                      echo "Releasing existing Spark optimizers..."
                      for jobId in $JOB_IDS; do
                        curl -s -b /tmp/cookies.txt \
                          -X DELETE "${BASE_URL}/api/ams/v1/optimize/optimizers/${jobId}" \
                          -H "X-Request-Source: Web" >/dev/null
                      done
                    fi

                    echo "Creating Spark optimizer parallelism={{ .Values.fusion.optimizer.spark.desiredParallelism }}..."
                    curl -s -b /tmp/cookies.txt \
                      -X POST "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers" \
                      -H "Content-Type: application/json" \
                      -H "X-Request-Source: Web" \
                      -d '{"parallelism":{{ .Values.fusion.optimizer.spark.desiredParallelism }}}'

                    echo ""
                    echo "============================================"
                    echo "  Fusion is ready!"
                    echo "  Login  : ${AMS_ADMIN__USERNAME} / ${AMS_ADMIN__PASSWORD}"
                    echo "============================================"
          ports:
            - name: rest
              containerPort: {{ .Values.fusion.server.rest.port }}
            - name: table
              containerPort: {{ .Values.fusion.server.table.port }}
            - name: optimizing
              containerPort: {{ .Values.fusion.server.optimizing.port }}
          volumeMounts:
            - name: fusion-config
              mountPath: /usr/local/amoro/conf/config.yaml
              subPath: config.yaml
            - name: fusion-config
              mountPath: /usr/local/amoro/conf/pod-template.yaml
              subPath: pod-template.yaml
            - name: spark-binaries
              mountPath: /opt/spark
            - name: shared-storage
              mountPath: /data/fusion-logs
              subPath: fusion-logs
          env:
            - name: AMORO_CONF_DIR
              value: "/usr/local/amoro/conf"
            - name: FUSION_LOGS_DIRECTORY
              value: "/data/fusion-logs"
            {{- range $key, $value := .Values.global.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.fusion.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: "AMS_ADMIN__USERNAME"
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.fullname" . }}-fusion
                  key: AdminUsername
            - name: "AMS_ADMIN__PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.fullname" . }}-fusion
                  key: AdminPassword
            - name: AMS_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}username{{ else }}{{ .Values.postgresql.external.secretKeys.username }}{{ end }}
            - name: AMS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}password{{ else }}{{ .Values.postgresql.external.secretKeys.password }}{{ end }}
          {{- $defaultResources := dict
            "requests" (dict "memory" "512Mi" "cpu" "500m")
          }}
          {{- $resources := mergeOverwrite $defaultResources (.Values.fusion.resources | default dict) }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          {{- $defaultLivenessProbe := dict
            "initialDelaySeconds" 40
            "periodSeconds" 10
            "timeoutSeconds" 2
            "failureThreshold" 10
            "successThreshold" 1
            "httpGet" (dict "path" "/api/ams/v1/health/status" "port" "rest")
          }}
          {{- $livenessProbe := mergeOverwrite $defaultLivenessProbe (.Values.fusion.livenessProbe | default dict) }}
          livenessProbe:
            {{- toYaml $livenessProbe | nindent 12 }}
          {{- $defaultReadinessProbe := dict
            "initialDelaySeconds" 30
            "periodSeconds" 10
            "timeoutSeconds" 2
            "failureThreshold" 10
            "successThreshold" 1
            "httpGet" (dict "path" "/api/ams/v1/versionInfo" "port" "rest")
          }}
          {{- $readinessProbe := mergeOverwrite $defaultReadinessProbe (.Values.fusion.readinessProbe | default dict) }}
          readinessProbe:
            {{- toYaml $readinessProbe | nindent 12 }}
      volumes:
        - name: fusion-config
          configMap:
            name: {{ include "olake.fullname" . }}-fusion-config
        - name: spark-binaries
          emptyDir: {}
        - name: shared-storage
          persistentVolumeClaim:
            claimName: {{ include "olake.sharedStoragePVC" . }}
{{- end }}
