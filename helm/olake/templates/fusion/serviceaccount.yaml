{{- if .Values.fusion.enabled }}
{{- if .Values.fusion.serviceAccount.create }}

{{- $jobAnnotations := .Values.global.jobServiceAccount.annotations | default dict }}
{{- $fusionAnnotations := .Values.fusion.serviceAccount.annotations | default dict }}
{{- /* merge overwrites duplicate keys; fusion wins on conflicts (Glue IRSA, etc.) */}}
{{- $mergedAnnotations := mergeOverwrite $jobAnnotations $fusionAnnotations }}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "olake.fusionServiceAccountName" . }}
  namespace: {{ include "olake.namespace" . }}
  labels:
    {{- include "olake.labels" . | nindent 4 }}
    app.kubernetes.io/component: fusion
  {{- with $mergedAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}