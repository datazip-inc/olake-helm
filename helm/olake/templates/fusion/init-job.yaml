{{- if .Values.fusion.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "olake.fullname" . }}-fusion-init
  namespace: {{ include "olake.namespace" . }}
  labels:
    {{- include "olake.labels" . | nindent 4 }}
    app.kubernetes.io/component: fusion
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "olake.name" . }}-fusion-init
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: fusion
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fusion-init
          image: "{{ include "olake.registryBase" . }}/curlimages/curl:8.1.2"
          imagePullPolicy: IfNotPresent
          env:
            - name: FUSION_HOST
              value: "{{ include "olake.fullname" . }}-fusion.{{ include "olake.namespace" . }}.svc.cluster.local"
            - name: FUSION_PORT
              value: "{{ .Values.fusion.server.rest.port }}"
            - name: FUSION_ADMIN_USER
              value: "{{ .Values.fusion.adminUser }}"
            - name: FUSION_ADMIN_PASSWORD
              value: "{{ .Values.fusion.adminPassword }}"
            - name: CATALOG_NAME
              value: "{{ .Values.fusion.s3.catalogName }}"
            - name: S3_ENDPOINT
              value: "{{ .Values.fusion.s3.endpoint | default .Values.global.env.AWS_EC2_METADATA_SERVICE_ENDPOINT }}"
            - name: S3_REGION
              value: "{{ .Values.fusion.s3.region | default ""}}"
            - name: S3_BUCKET
              value: "{{ .Values.fusion.s3.bucket | default "" }}"
            - name: S3_PATH_STYLE
              value: "{{ if .Values.fusion.s3.pathStyleAccess }}true{{ else }}false{{ end }}"
            - name: S3_ACCESS_KEY
              value: "{{ .Values.fusion.s3.accessKeyId | default "" }}"
            - name: S3_SECRET_KEY
              value: "{{ .Values.fusion.s3.secretAccessKey | default "" }}"
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}host{{ else }}{{ .Values.postgresql.external.secretKeys.host }}{{ end }}
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}port{{ else }}{{ .Values.postgresql.external.secretKeys.port }}{{ end }}
            - name: PG_DB
              value: "{{ .Values.fusion.database.db | default "postgres" }}"
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}username{{ else }}{{ .Values.postgresql.external.secretKeys.username }}{{ end }}
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "olake.postgresql.secretName" . }}
                  key: {{ if .Values.postgresql.enabled }}password{{ else }}{{ .Values.postgresql.external.secretKeys.password }}{{ end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              BASE_URL="http://${FUSION_HOST}:${FUSION_PORT}"

              echo "Waiting for Fusion to be ready at ${BASE_URL}..."
              until curl -sf "${BASE_URL}/" >/dev/null 2>&1; do
                echo "Fusion not ready yet. Waiting..."
                sleep 2
              done
              sleep 10

              echo "Logging into Fusion..."
              curl -sf -c /tmp/cookies.txt \
                -X POST "${BASE_URL}/api/ams/v1/login" \
                -H "Content-Type: application/json" \
                -H "X-Request-Source: Web" \
                -d "{\"user\":\"${FUSION_ADMIN_USER}\",\"password\":\"${FUSION_ADMIN_PASSWORD}\"}"
              echo ""

              # ---- Optimizer Group (Spark on Kubernetes) ----
              echo "Checking optimizer group 'spark-container'..."
              GROUPS=$(curl -s -b /tmp/cookies.txt \
                -H "X-Request-Source: Web" \
                "${BASE_URL}/api/ams/v1/optimize/resourceGroups")

              if echo "$GROUPS" | grep -q '"name":"spark-container"'; then
                echo "  Optimizer group 'spark-container' already exists — skipping."
              else
                echo "  Creating optimizer group 'spark-container' (Spark on K8s)..."
                curl -s -b /tmp/cookies.txt \
                  -X POST "${BASE_URL}/api/ams/v1/optimize/resourceGroups" \
                  -H "Content-Type: application/json" \
                  -H "X-Request-Source: Web" \
                  -d '{"name":"spark-container","container":"sparkContainer","properties":{}}'
                echo ""
                sleep 5
              fi

              # ---- Optimizer (always ensure at least 1 is running) ----
              echo "Checking optimizers for group 'spark-container'..."
              OPTIMIZERS=$(curl -s -b /tmp/cookies.txt \
                -H "X-Request-Source: Web" \
                "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers?page=1&pageSize=10")

              if echo "$OPTIMIZERS" | grep -q '"jobStatus":"RUNNING"'; then
                echo "  Spark optimizer already running — skipping."
              else
                echo "  Scaling out Spark optimizer (parallelism=1)..."
                curl -s -b /tmp/cookies.txt \
                  -X POST "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers" \
                  -H "Content-Type: application/json" \
                  -H "X-Request-Source: Web" \
                  -d '{"parallelism":1}'
                echo ""
                sleep 5
              fi


              #--- Debug
              curl -s -b /tmp/cookies.txt \
                -H "X-Request-Source: Web" \
                "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers?page=1&pageSize=10"

              # ---- Catalog ----
              echo "Checking catalog '${CATALOG_NAME}'..."
              CATALOGS=$(curl -s -b /tmp/cookies.txt \
                -H "X-Request-Source: Web" \
                "${BASE_URL}/api/ams/v1/catalogs")

              if echo "$CATALOGS" | grep -q "\"catalogName\":\"${CATALOG_NAME}\""; then
                echo "  Catalog '${CATALOG_NAME}' already exists — skipping."
              else
                echo "  Creating catalog '${CATALOG_NAME}' (Iceberg JdbcCatalog on Postgres + S3)..."
                WAREHOUSE_PATH="s3://${S3_BUCKET}/${CATALOG_NAME}/"
                curl -s -b /tmp/cookies.txt \
                  -X POST "${BASE_URL}/api/ams/v1/catalogs" \
                  -H "Content-Type: application/json" \
                  -H "X-Request-Source: Web" \
                  -d "{
                    \"name\":\"${CATALOG_NAME}\",
                    \"type\":\"custom\",
                    \"optimizerGroup\":\"spark-container\",
                    \"tableFormatList\":[\"ICEBERG\"],
                    \"storageConfig\":{
                      \"storage.type\":\"S3\",
                      \"storage.s3.endpoint\":\"${S3_ENDPOINT}\",
                      \"storage.s3.region\":\"${S3_REGION}\"
                    },
                    \"authConfig\":{
                      \"auth.type\":\"AKSK\",
                      \"auth.aksk.access-key\":\"${S3_ACCESS_KEY}\",
                      \"auth.aksk.secret-key\":\"${S3_SECRET_KEY}\"
                    },
                    \"properties\":{
                      \"catalog-impl\":\"org.apache.iceberg.jdbc.JdbcCatalog\",
                      \"uri\":\"{{ .Values.fusion.catalog.jdbcUri | default "jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}" }}\",
                      \"jdbc.user\":\"{{ .Values.fusion.catalog.jdbcUser | default "${PG_USER}" }}\",
                      \"jdbc.password\":\"{{ .Values.fusion.catalog.jdbcPassword | default "${PG_PASSWORD}" }}\",
                      \"jdbc.driver\":\"org.postgresql.Driver\",
                      \"jdbc.schema-version\":\"V1\",
                      \"warehouse\":\"${WAREHOUSE_PATH}\",
                      \"s3.path-style-access\":\"${S3_PATH_STYLE}\",
                      \"io-impl\":\"org.apache.iceberg.aws.s3.S3FileIO\",
                      \"endpoint\":\"${S3_ENDPOINT}\",
                      \"access-key-id\":\"${S3_ACCESS_KEY}\",
                      \"secret-access-key\":\"${S3_SECRET_KEY}\"
                    },
                    \"tableProperties\":{}
                  }" >/dev/null
              fi

              echo ""
              echo "============================================"
              echo "  Fusion is ready!"
              echo "  Web UI : ${BASE_URL}"
              echo "  Login  : ${FUSION_ADMIN_USER} / ${FUSION_ADMIN_PASSWORD}"
              echo "  Catalog: ${CATALOG_NAME}"
              echo "============================================"

{{- end }}