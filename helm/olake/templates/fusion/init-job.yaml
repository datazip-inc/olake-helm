{{- if .Values.fusion.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "olake.fullname" . }}-fusion-init-{{ include (print $.Template.BasePath "/fusion/configmap.yaml") . | sha256sum | trunc 8 }}
  namespace: {{ include "olake.namespace" . }}
  labels:
    {{- include "olake.labels" . | nindent 4 }}
    app.kubernetes.io/component: fusion
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "olake.name" . }}-fusion-init
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: fusion
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fusion-init
          image: "{{ include "olake.registryBase" . }}/curlimages/curl:8.1.2"
          imagePullPolicy: IfNotPresent
          env:
            - name: FUSION_HOST
              value: "{{ include "olake.fullname" . }}-fusion-rest.{{ include "olake.namespace" . }}.svc.cluster.local"
            - name: FUSION_PORT
              value: "{{ .Values.fusion.server.rest.port }}"
            - name: FUSION_ADMIN_USER
              value: "{{ .Values.fusion.adminUser }}"
            - name: FUSION_ADMIN_PASSWORD
              value: "{{ .Values.fusion.adminPassword }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e

              BASE_URL="http://${FUSION_HOST}:${FUSION_PORT}"

              echo "Waiting for Fusion to be ready at ${BASE_URL}..."
              until curl -sf "${BASE_URL}/" >/dev/null 2>&1; do
                echo "Fusion not ready yet. Waiting..."
                sleep 2
              done
              sleep 10

              echo "Logging into Fusion..."
              curl -sf -c /tmp/cookies.txt \
                -X POST "${BASE_URL}/api/ams/v1/login" \
                -H "Content-Type: application/json" \
                -H "X-Request-Source: Web" \
                -d "{\"user\":\"${FUSION_ADMIN_USER}\",\"password\":\"${FUSION_ADMIN_PASSWORD}\"}"
              echo ""

              {{- if .Values.fusion.optimizer.spark.enabled }}
              # ---- Optimizer Group (Spark on Kubernetes) ----
              echo "Checking optimizer group 'spark-container'..."
              GROUPS=$(curl -s -b /tmp/cookies.txt \
                -H "X-Request-Source: Web" \
                "${BASE_URL}/api/ams/v1/optimize/resourceGroups")

              if echo "$GROUPS" | grep -q '"name":"spark-container"'; then
                echo "  Optimizer group 'spark-container' already exists — skipping."
              else
                echo "  Creating optimizer group 'spark-container' (Spark on K8s)..."
                curl -s -b /tmp/cookies.txt \
                  -X POST "${BASE_URL}/api/ams/v1/optimize/resourceGroups" \
                  -H "Content-Type: application/json" \
                  -H "X-Request-Source: Web" \
                  -d '{"name":"spark-container","container":"sparkContainer","properties":{}}'
                echo ""
                sleep 5
              fi

              # ---- Optimizer (always ensure at least 1 is running) ----
              echo "Checking optimizers for group 'spark-container'..."
              OPTIMIZERS=$(curl -s -b /tmp/cookies.txt \
                -H "X-Request-Source: Web" \
                "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers?page=1&pageSize=10")

              # `scaleOutOptimizer` creates new optimizer resources; to avoid accumulating multiple optimizers
              # across upgrades, release existing optimizers and then recreate with the desired parallelism.
              JOB_IDS=$(echo "$OPTIMIZERS" | grep -oE '"jobId":"[^"]+"' | cut -d':' -f2 | tr -d '"')
              if [ -n "$JOB_IDS" ]; then
                echo "Releasing existing Spark optimizers..."
                for jobId in $JOB_IDS; do
                  echo "  Releasing jobId=${jobId}..."
                  curl -s -b /tmp/cookies.txt \
                    -X DELETE "${BASE_URL}/api/ams/v1/optimize/optimizers/${jobId}" \
                    -H "X-Request-Source: Web" >/dev/null
                  sleep 2
                done
              else
                echo "No existing Spark optimizers found."
              fi

              echo "Creating Spark optimizer parallelism={{ .Values.fusion.optimizer.spark.desiredParallelism }}..."
              curl -s -b /tmp/cookies.txt \
                -X POST "${BASE_URL}/api/ams/v1/optimize/optimizerGroups/spark-container/optimizers" \
                -H "Content-Type: application/json" \
                -H "X-Request-Source: Web" \
                -d '{"parallelism":{{ .Values.fusion.optimizer.spark.desiredParallelism }}}'
              echo ""
              sleep 5
              {{- end }}

              echo ""
              echo "============================================"
              echo "  Fusion is ready!"
              echo "  Web UI : ${BASE_URL}"
              echo "  Login  : ${FUSION_ADMIN_USER} / ${FUSION_ADMIN_PASSWORD}"
              echo "============================================"

{{- end }}