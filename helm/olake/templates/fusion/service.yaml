{{- if .Values.fusion.enabled }}
{{- range $name, $config := .Values.fusion.server }}
{{- if $config.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "olake.fullname" $ }}-fusion-{{ $name }}
  namespace: {{ include "olake.namespace" $ }}
  labels:
    {{- include "olake.labels" $ | nindent 4 }}
    app.kubernetes.io/component: fusion
  {{- with $config.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $config.service.type }}
  ports:
    - name: {{ $name }}
      port: {{ $config.port }}
      targetPort: {{ $config.port }}
      protocol: TCP
      {{- if eq $config.service.type "NodePort" }}
      nodePort: {{ $config.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "olake.name" $ }}-fusion
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
{{- end }}
{{- end }}