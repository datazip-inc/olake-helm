{{- if .Values.global.jobServiceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "olake.jobServiceAccountName" . }}
  namespace: {{ include "olake.namespace" . }}
  labels:
    {{- include "olake.labels" . | nindent 4 }}
    app.kubernetes.io/component: job-serviceaccount
  {{- with .Values.global.jobServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- with .Values.global.imagePullSecrets }}
# Pods created by olake-workers (connector test/discover/sync jobs) run under this
# ServiceAccount, so attaching the pull secrets here lets the kubelet authenticate
# pulls from a private registry (Harbor, Nexus, etc.) without per-pod configuration.
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}